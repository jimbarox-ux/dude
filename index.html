<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LARP</title>
<meta name="description" content="LARP" />

<!-- Fonts: a tight display grotesk for the name + JetBrains Mono for everything else -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css" />

<!-- model-viewer: handles GLB loading/rendering. Built-in camera-controls is intentionally
     NOT used — js/main.js drives rotation manually so the device can ONLY be rotated,
     never zoomed or panned. -->
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</head>
<body>

<!-- ============================== -->
<!-- BACKGROUND LAYER -->
<!-- ============================== -->
<div class="bg-layer" aria-hidden="true">
  <video
    id="bgVideo"
    class="bg-video"
    src="assets/background.mp4"
    muted
    loop
    playsinline
    preload="auto"
  ></video>
  <div class="bg-noise"></div>
  <div class="bg-vignette"></div>
</div>

<!-- Background music. Saved as song.mp4 (audio track) — played via <audio>. -->
<audio id="songAudio" src="assets/song.mp4" loop preload="auto"></audio>

<!-- ============================== -->
<!-- ENTRY GATE -->
<!-- ============================== -->
<div class="gate" id="gate">
  <div class="gate__pulse" aria-hidden="true"></div>
  <button class="enter-btn" id="sealBtn" type="button" aria-label="Click to enter site and start audio">
    <span class="enter-btn__ring" aria-hidden="true"></span>
    <span class="enter-btn__label">click to enter</span>
  </button>
  <p class="gate__hint">sound on</p>
</div>

<!-- ============================== -->
<!-- MAIN CARD -->
<!-- ============================== -->
<main class="page">
  <section class="card" id="ledgerCard">

    <!-- ---- mute control, inline top of card ---- -->
    <button class="mute-btn" id="volSwitch" type="button" aria-pressed="true" aria-label="Mute background music">
      <svg class="mute-btn__icon mute-btn__icon--on" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 9v6h4l5 5V4L8 9H4Z" />
        <path d="M16.5 8.5a5 5 0 0 1 0 7" />
        <path d="M19 6a8.5 8.5 0 0 1 0 12" />
      </svg>
      <svg class="mute-btn__icon mute-btn__icon--off" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 9v6h4l5 5V4L8 9H4Z" />
        <path d="M16 9l5 6M21 9l-5 6" />
      </svg>
    </button>

    <!-- ---- profile ---- -->
    <header class="profile">
      <div class="avatar-wrap">
        <img class="avatar" id="discordAvatar" src="" alt="" hidden />
        <div class="avatar avatar--placeholder" id="discordAvatarPlaceholder"></div>
        <span class="status-dot" id="discordStatusDot" data-status="offline" title="offline"></span>
      </div>
      <h1 class="display-name">Your Name Here</h1>
      <p class="tagline">LARP</p>
      <p class="discord-status-text" id="discordStatusText">connecting&hellip;</p>
    </header>

    <!-- ============================== -->
    <!-- CRYPTO ROWS -->
    <!-- ============================== -->
    <ul class="entries" id="entries">

      <li class="entry" data-coin="btc" data-cg-id="bitcoin" data-address="YOUR_BTC_ADDRESS_HERE">
        <span class="entry__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M14.24 10.56c.34-1.6-.98-2.46-2.65-3.04l.54-2.18-1.32-.33-.53 2.12c-.35-.09-.7-.17-1.06-.25l.53-2.13-1.32-.33-.54 2.18c-.29-.07-.58-.13-.86-.2v-.01l-1.82-.46-.35 1.41s.98.22.96.24c.54.13.63.49.62.77l-.62 2.47c.04.01.08.02.13.05l-.13-.03-.86 3.47c-.07.16-.23.41-.6.31.01.02-.96-.24-.96-.24l-.66 1.51 1.72.43c.32.08.63.16.94.25l-.55 2.21 1.31.33.54-2.19c.36.1.71.19 1.05.27l-.54 2.17 1.32.33.55-2.2c2.25.43 3.94.26 4.65-1.78.58-1.64-.03-2.59-1.22-3.21.86-.2 1.51-.77 1.69-1.94ZM11.62 14.5c-.41 1.64-3.18.76-4.08.53l.73-2.91c.9.22 3.78.67 3.35 2.38Zm.41-4.16c-.37 1.49-2.68.73-3.42.55l.66-2.65c.75.18 3.15.53 2.76 2.1Z"/></svg>
        </span>
        <span class="entry__name">BTC</span>
        <span class="entry__chart" aria-hidden="true">
          <canvas class="entry__sparkline" data-coin="btc" width="86" height="28"></canvas>
        </span>
        <span class="entry__pct" id="pct-btc">&middot;&middot;&middot;</span>
        <button class="copy-btn" type="button" aria-label="Copy Bitcoin address">
          <svg class="copy-btn__icon copy-btn__icon--copy" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>
          </svg>
          <svg class="copy-btn__icon copy-btn__icon--done" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        </button>
        <span class="entry__tooltip" role="status" aria-live="polite">Copy Address</span>
      </li>

      <li class="entry" data-coin="eth" data-cg-id="ethereum" data-address="YOUR_ETH_ADDRESS_HERE">
        <span class="entry__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2 5.5 12.5 12 16l6.5-3.5L12 2Z"/><path d="M5.5 13.8 12 22l6.5-8.2L12 17.3 5.5 13.8Z"/></svg>
        </span>
        <span class="entry__name">ETH</span>
        <span class="entry__chart" aria-hidden="true">
          <canvas class="entry__sparkline" data-coin="eth" width="86" height="28"></canvas>
        </span>
        <span class="entry__pct" id="pct-eth">&middot;&middot;&middot;</span>
        <button class="copy-btn" type="button" aria-label="Copy Ethereum address">
          <svg class="copy-btn__icon copy-btn__icon--copy" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>
          </svg>
          <svg class="copy-btn__icon copy-btn__icon--done" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        </button>
        <span class="entry__tooltip" role="status" aria-live="polite">Copy Address</span>
      </li>

      <li class="entry" data-coin="ltc" data-cg-id="litecoin" data-address="YOUR_LTC_ADDRESS_HERE">
        <span class="entry__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M9.5 4 7 13.2l-2 .7-.5 1.8 2-.7-1 3.7h9.7l.7-2.6H8.6l1-3.6 2-.7.5-1.8-2 .7L11.8 4H9.5Z"/></svg>
        </span>
        <span class="entry__name">LTC</span>
        <span class="entry__chart" aria-hidden="true">
          <canvas class="entry__sparkline" data-coin="ltc" width="86" height="28"></canvas>
        </span>
        <span class="entry__pct" id="pct-ltc">&middot;&middot;&middot;</span>
        <button class="copy-btn" type="button" aria-label="Copy Litecoin address">
          <svg class="copy-btn__icon copy-btn__icon--copy" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>
          </svg>
          <svg class="copy-btn__icon copy-btn__icon--done" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        </button>
        <span class="entry__tooltip" role="status" aria-live="polite">Copy Address</span>
      </li>

    </ul>

    <!-- ============================== -->
    <!-- LEDGER 3D VIEWER -->
    <!-- ============================== -->
    <section class="vault" aria-label="3D Ledger hardware wallet viewer">
      <div class="vault__case" id="vaultCase">
        <div class="vault__viewport" id="vaultViewport">
          <model-viewer
            id="ledgerModel"
            class="ledger-model"
            src="assets/ledger.glb"
            alt="A rotating 3D model of a Ledger hardware wallet"
            shadow-intensity="0"
            exposure="1.1"
            tone-mapping="neutral"
            interaction-prompt="none"
            disable-zoom
            camera-orbit="0deg 75deg 105%"
            field-of-view="30deg"
            loading="eager"
            reveal="auto"
          ></model-viewer>

          <div class="vault__loader" id="vaultLoader">
            <span class="vault__loader-bar"></span>
          </div>
        </div>

        <p class="vault__hint">
          <svg class="vault__hint-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7" />
            <path d="M3 4v5h5" />
          </svg>
          drag to rotate
        </p>
      </div>
    </section>

    <footer class="card__footer">
      <p>made with <span class="footer-heart">&hearts;</span> &middot; <span id="year"></span></p>
    </footer>

  </section>
</main>

<script src="js/main.js" defer></script>
</body>
</html>
